<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Interview - AI Interview Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dashboard">
        <div class="container">
            <div class="nav-brand">
                <h2>🎯 AI Interview Platform</h2>
            </div>
            <div class="nav-links">
                <span class="interview-info">
                    <strong>{{ role }}</strong> - {{ difficulty.capitalize() }}
                </span>
                <button id="endInterviewBtn" class="btn btn-sm btn-danger">End Interview</button>
            </div>
        </div>
    </nav>

    <!-- Interview Chat Interface -->
    <div class="interview-container">
        <div class="container-fluid">
            <!-- Chat Messages Area -->
            <div class="chat-window" id="chatWindow">
                <div id="chatMessages">
                    <!-- Messages will be loaded here dynamically -->
                    <div class="loading-message">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <p>Loading interview...</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-container">
                <div class="container">
                    <!-- Voice Control Buttons -->
                    <div class="voice-controls" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;">
                        <button onclick="repeatQuestion()" class="btn btn-secondary btn-sm" title="Repeat the last question">
                            🔁 Repeat Question
                        </button>
                        <button onclick="stopVoice()" class="btn btn-secondary btn-sm" title="Stop AI voice">
                            🔇 Stop Voice
                        </button>
                    </div>
                    
                    <div class="chat-input-wrapper">
                        <textarea 
                            id="userInput" 
                            class="chat-input" 
                            placeholder="Type your answer here..."
                            rows="3"></textarea>
                        
                        <div class="chat-actions">
                            <button id="voiceBtn" class="btn btn-icon" title="Voice Input">
                                🎤
                            </button>
                            <button id="sendBtn" class="btn btn-primary">
                                Send Answer
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- End Interview Modal -->
    <div id="endInterviewModal" class="modal">
        <div class="modal-content">
            <h3>End Interview?</h3>
            <p>Are you sure you want to end this interview? Your answers will be evaluated.</p>
            <div class="modal-actions">
                <button id="cancelEndBtn" class="btn btn-secondary">Cancel</button>
                <button id="confirmEndBtn" class="btn btn-danger">End & Evaluate</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>💡 Tip: Take your time to think before answering. Quality over speed!</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        // Initialize interview chat
        document.addEventListener('DOMContentLoaded', function() {
            initializeInterviewChat();
        });
    </script>
</body>
</html>
